<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Rounded white background square (squircle) -->
  <rect width="512" height="512" rx="110" fill="#FFFFFF" />
  
  <defs>
    <!-- Left bar gradient: Coral-Red to Orange -->
    <linearGradient id="left-bar-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF4B8B" />
      <stop offset="100%" stop-color="#FF8F3D" />
    </linearGradient>
    
    <!-- Middle bar gradient: Purple to Indigo -->
    <linearGradient id="mid-bar-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B1FA2" />
      <stop offset="100%" stop-color="#B388FF" />
    </linearGradient>
    
    <!-- Right bar gradient: Blue to Cyan/Sky Blue -->
    <linearGradient id="right-bar-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1976D2" />
      <stop offset="100%" stop-color="#40C4FF" />
    </linearGradient>
  </defs>

  <!-- Skew and translate to center the bars within the 512x512 canvas -->
  <g transform="skewX(-14) translate(121.5, -14)">
    <!-- Left Bar (Shortest) -->
    <rect x="90" y="290" width="60" height="130" rx="30" fill="url(#left-bar-grad)" />
    
    <!-- Middle Bar (Medium) -->
    <rect x="172" y="210" width="60" height="210" rx="30" fill="url(#mid-bar-grad)" />
    
    <!-- Right Bar (Tallest) -->
    <rect x="254" y="120" width="60" height="300" rx="30" fill="url(#right-bar-grad)" />
  </g>
</svg>
